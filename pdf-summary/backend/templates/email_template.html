<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      font-family: &quot;Malgun Gothic&quot;, dotum, sans-serif;
      background-color: #f4f7f6;
    "
  >
    <div
      style="
        max-width: 600px;
        margin: 40px auto;
        background-color: #ffffff;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      "
    >
      <div
        style="
          background-color: #4a90e2;
          padding: 30px 20px;
          text-align: center;
        "
      >
        <h1 style="color: #ffffff; margin: 0; font-size: 24px">
          본인확인 인증번호
        </h1>
      </div>

      <div style="padding: 40px 30px; text-align: center">
        <p
          style="
            font-size: 16px;
            color: #333333;
            line-height: 1.6;
            margin-bottom: 30px;
          "
        >
          안녕하세요!<br />
          <strong>PDF 요약 서비스</strong> 요청하신 인증번호를 안내해
          드립니다.<br />
          아래의 6자리 숫자를 화면에 입력해 주세요.
        </p>

        <div
          style="
            background-color: #f8f9fa;
            border: 2px dashed #4a90e2;
            border-radius: 8px;
            padding: 20px;
            margin: 0 auto;
            width: 60%;
            letter-spacing: 5px;
          "
        >
          <span style="font-size: 32px; font-weight: bold; color: #4a90e2"
            >{{code}}</span
          >
        </div>
      </div>

      <div
        style="
          background-color: #fdfdfd;
          padding: 20px;
          text-align: center;
          border-top: 1px solid #eeeeee;
        "
      >
        <p style="font-size: 12px; color: #999999; margin: 0">
          본 메일은 발신 전용 메일입니다.<br />
          본인이 요청하지 않으셨다면 이 메일을 무시해 주세요.
        </p>
      </div>
    </div>
  </body>
</html>
