services:
  db:
    image: mariadb:11.4
    container_name: pdf_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "9487"
      MARIADB_DATABASE: pdf_summary
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-p9487"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    image: pdf-summary-app:latest
    container_name: pdf_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_HOST: 192.168.0.151
      DB_PORT: 3307
      DB_USER: root
      DB_PASSWORD: "9487"
      DB_NAME: pdf_summary
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EXTRACT_DEFAULT_MODEL: gemma3:latest
      CHAT_DEFAULT_MODEL: phi3:mini
      CHAT_NUM_CTX: "4096"
      CHAT_NUM_PREDICT: "900"
      CHAT_REPEAT_PENALTY: "1.1"
      DEFAULT_MODEL: gemma3:latest
      LORA_MODEL_NAME: phi3:mini
      CHROMA_BASE_URL: http://chroma:8000
      CHROMA_COLLECTION: documents
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OCR_USE_GPU: "true"
      PADDLE_DEVICE: gpu:0
      # 협업자 추가
      USE_REDIS: "true"
      REDIS_URL: "redis://redis:6379/0"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  redis:
    image: redis:7-alpine
    container_name: pdf_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma:0.5.5
    container_name: pdf_chroma
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  worker_ocr:
    image: pdf-summary-app:latest
    container_name: pdf_worker_ocr
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: python -m celery -A celery_app.celery_app worker -Q ocr --loglevel=info --concurrency=2 --hostname=ocr@%h
    environment:
      DB_HOST: 192.168.0.151
      DB_PORT: 3307
      DB_USER: root
      DB_PASSWORD: "9487"
      DB_NAME: pdf_summary
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EXTRACT_DEFAULT_MODEL: gemma3:latest
      CHAT_DEFAULT_MODEL: phi3:mini
      CHAT_NUM_CTX: "4096"
      CHAT_NUM_PREDICT: "900"
      CHAT_REPEAT_PENALTY: "1.1"
      DEFAULT_MODEL: gemma3:latest
      LORA_MODEL_NAME: phi3:mini
      CHROMA_BASE_URL: http://chroma:8000
      CHROMA_COLLECTION: documents
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      LIBREOFFICE_PATH: /usr/bin/soffice
      PYTHONPATH: /app
      OCR_USE_GPU: "true"
      PADDLE_DEVICE: gpu:0
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./backend:/app

  worker_llm:
    image: pdf-summary-app:latest
    container_name: pdf_worker_llm
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: python -m celery -A celery_app.celery_app worker -Q llm --loglevel=info --concurrency=2 --hostname=llm@%h
    environment:
      DB_HOST: 192.168.0.151
      DB_PORT: 3307
      DB_USER: root
      DB_PASSWORD: "9487"
      DB_NAME: pdf_summary
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EXTRACT_DEFAULT_MODEL: gemma3:latest
      CHAT_DEFAULT_MODEL: phi3:mini
      CHAT_NUM_CTX: "4096"
      CHAT_NUM_PREDICT: "900"
      CHAT_REPEAT_PENALTY: "1.1"
      DEFAULT_MODEL: gemma3:latest
      LORA_MODEL_NAME: phi3:mini
      CHROMA_BASE_URL: http://chroma:8000
      CHROMA_COLLECTION: documents
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PYTHONPATH: /app
    volumes:
      - ./backend:/app

  flower:
    image: pdf-summary-app:latest
    container_name: pdf_flower
    restart: unless-stopped
    depends_on:
      - redis
    command: python -m celery -A celery_app.celery_app flower --port=5555
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PYTHONPATH: /app
    ports:
      - "5555:5555"

  ollama:
    image: ollama/ollama:latest
    container_name: pdf_ollama
    restart: unless-stopped
    profiles:
      - ollama
    ports:
      - "11434:11434"
    gpus: all
    environment:
      OLLAMA_GPU_OVERHEAD: "134217728"
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_NUM_PARALLEL: "1"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build: ./frontend
    container_name: pdf_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_PORT: "8000"
      VITE_BACKEND_TARGET: http://backend:8000
      NODE_ENV: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  ollama_data:
  mariadb_data:
  chroma_data: