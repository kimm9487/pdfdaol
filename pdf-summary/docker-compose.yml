services:
  # 1. 기존 'db:' 섹션을 통째로 삭제했습니다. 
  # 로컬에 DB를 띄우지 않고 192.168.0.151 주소를 직접 사용하기 때문입니다.

  backend:
    build: ./backend
    container_name: pdf_backend
    restart: unless-stopped
    # 2. 로컬 DB 컨테이너를 기다리던 depends_on 설정도 삭제했습니다.
    environment:
      DB_HOST: 192.168.0.151
      # 3. 중요!! 포트 번호 확인: 
      # 외부 DB 서버 자체가 3307 포트로 열려있는 게 확실하다면 3307이 맞지만,
      # 일반적인 MariaDB/MySQL의 기본 내부 포트는 3306입니다. 
      # 만약 연결이 안 된다면 3306으로 바꿔보세요.
      DB_PORT: 3307 
      DB_USER: appuser1
      DB_PASSWORD: "1111"  # 숫자로만 된 비밀번호는 따옴표로 감싸는 게 안전합니다.
      DB_NAME: pdf_summary
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: pdf_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_PORT: "8000"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

# 4. 로컬 DB를 안 쓰므로 아래 볼륨 설정도 지워도 무방합니다.
# volumes:
#   mariadb_data: