services:
  db:
    image: mariadb:11.4
    container_name: pdf_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "9487"
      MARIADB_DATABASE: pdf_summary
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-p9487"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    container_name: pdf_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_HOST: 192.168.0.151
      DB_PORT: 3307
      DB_USER: root
      DB_PASSWORD: "9487"
      DB_NAME: pdf_summary
      CHROMA_BASE_URL: http://chroma:8000
      CHROMA_COLLECTION: documents
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OCR_USE_GPU: "true"
      PADDLE_DEVICE: gpu:0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  redis:
    image: redis:7-alpine
    container_name: pdf_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma:0.5.5
    container_name: pdf_chroma
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  worker_ocr:
    build: ./backend
    container_name: pdf_worker_ocr
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: python -m celery -A celery_app.celery_app worker -Q ocr --loglevel=info --concurrency=2 --hostname=ocr@%h
    environment:
      DB_HOST: 192.168.0.151
      DB_PORT: 3307
      DB_USER: root
      DB_PASSWORD: "9487"
      DB_NAME: pdf_summary
      CHROMA_BASE_URL: http://chroma:8000
      CHROMA_COLLECTION: documents
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PYTHONPATH: /app
      OCR_USE_GPU: "true"
      PADDLE_DEVICE: gpu:0
    volumes:
      - ./backend:/app

  worker_llm:
    build: ./backend
    container_name: pdf_worker_llm
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: python -m celery -A celery_app.celery_app worker -Q llm --loglevel=info --concurrency=2 --hostname=llm@%h
    environment:
      DB_HOST: 192.168.0.151
      DB_PORT: 3307
      DB_USER: root
      DB_PASSWORD: "9487"
      DB_NAME: pdf_summary
      CHROMA_BASE_URL: http://chroma:8000
      CHROMA_COLLECTION: documents
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PYTHONPATH: /app
    volumes:
      - ./backend:/app

  flower:
    build: ./backend
    container_name: pdf_flower
    restart: unless-stopped
    depends_on:
      - redis
    command: python -m celery -A celery_app.celery_app flower --port=5555
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PYTHONPATH: /app
    ports:
      - "5555:5555"

  ollama:
    image: ollama/ollama:latest
    container_name: pdf_ollama
    restart: unless-stopped
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  frontend:
    build: ./frontend
    container_name: pdf_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_PORT: "8000"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
volumes:
  ollama_data:
  mariadb_data:
  chroma_data:
