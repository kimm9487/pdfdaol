services:
  db:
    image: mariadb:11.4
    container_name: pdf_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-9487}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-pdf_summary}
      MARIADB_USER: ${MARIADB_USER:-pdf_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-pdf_user_pw}
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -uroot -p$$MARIADB_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./backend/database_migration.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  backend:
    build: ./backend
    container_name: pdf_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MARIADB_USER:-pdf_user}
      DB_PASSWORD: ${MARIADB_PASSWORD:-pdf_user_pw}
      DB_NAME: ${MARIADB_DATABASE:-pdf_summary}
    ports:
      - "8000:8000"
    environment:

      - DB_HOST=192.168.0.151
      - DB_PORT=3306
      - DB_USER=appuser1
      - DB_PASSWORD=1111
      - DB_NAME=pdf_summary
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: pdf_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_PORT: "8000"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules    # 로컬과 도커의 노드 모듈 충돌 방지



