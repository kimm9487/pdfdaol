version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: chat-redis
    ports:
      - "6379:6379"           # 로컬에서 redis-cli로 확인 가능
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis
    environment:
      USE_REDIS: "true"
      REDIS_URL: "redis://redis:6379/0"   # docker 내부 서비스 이름

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_BACKEND_TARGET: http://backend:8000
      NODE_ENV: development
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend